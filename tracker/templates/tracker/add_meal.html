<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un repas - NutriTrack</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; }
        form { display: flex; flex-direction: column; gap: 15px; }
        .btn { background: #2e7d32; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .back-link { display: block; margin-top: 15px; text-align: center; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>➕ Ajouter un aliment</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}

        <div class="mt-3">
            <button type="submit" name="action" value="add_food_only" class="btn btn-info">
                Créer cet aliment uniquement
            </button>

            <button type="submit" name="action" value="save_meal" class="btn btn-success">
                Enregistrer le repas
            </button>
            
        </div>
    </form>
    <a href="{% url 'dashboard' %}" class="back-link">⬅️ Retour au dashboard</a>
</div>

</body>
</html>
